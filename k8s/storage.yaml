apiVersion: v1
kind: PersistentVolume
metadata:
  name: rm-monitor-records
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: rm-monitor-records
  local:
    path: /data/rm-monitor/records
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: rm-monitor/storage
              operator: In
              values:
                - "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rm-monitor-records
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rm-monitor-records
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: rm-rec-webdav-rclone-csi
type: Opaque
stringData:
  remote: openlist
  remotePath: ""
  configData: |
    [openlist]
    type = webdav
    url = http://rm-rec-service.rm-monitor.svc.cluster.local:5244/dav/
    vendor = other
    user = rec
    pass = change-me
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rm-monitor-records-webdav
  annotations:
    pv.kubernetes.io/provisioned-by: rclone.csi.veloxpack.io
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: rm-monitor-records-webdav
  mountOptions:
    - vfs-cache-mode=writes
    - vfs-cache-max-size=10G
    - dir-cache-time=30s
  csi:
    driver: rclone.csi.veloxpack.io
    volumeHandle: rm-monitor-records-webdav
    nodePublishSecretRef:
      name: rm-rec-webdav-rclone-csi
      namespace: rm-monitor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rm-monitor-records-webdav
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: rm-monitor-records-webdav
  resources:
    requests:
      storage: 500Gi
  volumeName: rm-monitor-records-webdav
