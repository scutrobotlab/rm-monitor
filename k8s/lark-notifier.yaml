apiVersion: v1
kind: ConfigMap
metadata:
  name: lark-notifier-config
data:
  config.yml: |
    LarkConf:
      AppId: ""
      AppSecret: ""
    RedisConf:
      Host: redis:6379
      Pass: ""
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: true
    RecordConf:
      BaseDir: /app/data
      RootNode: ""
    UploadConf:
      Concurrency: 1
      PartRetries: 3
      RetryBackoff: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lark-notifier
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lark-notifier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lark-notifier
    spec:
      containers:
        - name: lark-notifier
          image: rm-monitor/lark-notifier:latest
          args:
            - -f
            - /app/etc/config.yml
          volumeMounts:
            - name: config
              mountPath: /app/etc/config.yml
              subPath: config.yml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: lark-notifier-config
