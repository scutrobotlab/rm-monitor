apiVersion: v1
kind: ServiceAccount
metadata:
  name: rm-monitor-dispatcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rm-monitor-dispatcher
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rm-monitor-dispatcher
subjects:
  - kind: ServiceAccount
    name: rm-monitor-dispatcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rm-monitor-dispatcher
