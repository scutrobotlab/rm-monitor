apiVersion: v1
kind: ConfigMap
metadata:
  name: transcode-dispatcher-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: true
    TranscodeConf:
      BaseDir: /records
      AllowedWindow: "23:00-06:00"
      SuspendWhenRecordingActive: true
      SourceRetentionDays: 7
      CPURequest: "500m"
      MemoryRequest: "512Mi"
      MemoryLimit: "2Gi"
    K8sJobConf:
      Namespace: rm-monitor
      Image: rm-monitor/transcode-job:latest
      ConfigMapName: transcode-job-config
      RecordsPVC: rm-monitor-records
      RecordsMountPath: /records
      TTLSecondsAfterFinished: 86400
    Priority: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: transcode-job-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: false
    TranscodeConf:
      BaseDir: /records
      SourceRetentionDays: 7
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: artifact-cleaner-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: false
    TranscodeConf:
      BaseDir: /records
      SourceRetentionDays: 7
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcode-dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transcode-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transcode-dispatcher
    spec:
      serviceAccountName: rm-monitor-dispatcher
      containers:
        - name: transcode-dispatcher
          image: rm-monitor/transcode-dispatcher:latest
          imagePullPolicy: Always
          args: ["-f", "/etc/rm-monitor/config.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/rm-monitor/config.yml
              subPath: config.yml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: transcode-dispatcher-config
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: artifact-cleaner
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: rm-monitor-dispatcher
          restartPolicy: Never
          nodeSelector:
            rm-monitor/storage: "true"
          containers:
            - name: artifact-cleaner
              image: rm-monitor/artifact-cleaner:latest
              imagePullPolicy: Always
              args: ["-f", "/etc/rm-monitor/config.yml"]
              volumeMounts:
                - name: config
                  mountPath: /etc/rm-monitor/config.yml
                  subPath: config.yml
                  readOnly: true
                - name: records
                  mountPath: /records
          volumes:
            - name: config
              configMap:
                name: artifact-cleaner-config
            - name: records
              persistentVolumeClaim:
                claimName: rm-monitor-records
