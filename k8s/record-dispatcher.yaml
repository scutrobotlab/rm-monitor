apiVersion: v1
kind: ConfigMap
metadata:
  name: record-dispatcher-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: true
    RecordConf:
      Res: middle
      RoleBlackList:
        - "主视角（无解说版）"
        - "蓝方机器人第一视角合集"
        - "红方机器人第一视角合集"
      BaseDir: /records
      PathTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}/Round-{{.RoundNo}}/{{.Role}}.flv"
      MatchDirTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}"
      MatchNameTemplate: "{{.Order}}. {{.RedSchool}}-{{.RedName}} VS {{.BlueSchool}}-{{.BlueName}}"
    K8sJobConf:
      Namespace: rm-monitor
      Image: rm-monitor/record-job:latest
      ConfigMapName: record-job-config
      RecordsPVC: rm-monitor-records
      RecordsMountPath: /records
      TTLSecondsAfterFinished: 86400
    ManifestJobConf:
      Namespace: rm-monitor
      Image: rm-monitor/manifest-job:latest
      ConfigMapName: manifest-job-config
      RecordsPVC: rm-monitor-records
      RecordsMountPath: /records
      ImagePullPolicy: Always
      TTLSecondsAfterFinished: 86400
    Priority: []
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: record-job-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: false
    RecordConf:
      Res: middle
      BaseDir: /records
      PathTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}/Round-{{.RoundNo}}/{{.Role}}.flv"
      MatchDirTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}"
      MatchNameTemplate: "{{.Order}}. {{.RedSchool}}-{{.RedName}} VS {{.BlueSchool}}-{{.BlueName}}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: manifest-job-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: false
    RecordConf:
      Res: middle
      BaseDir: /records
      PathTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}/Round-{{.RoundNo}}/{{.Role}}.flv"
      MatchDirTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}"
      MatchNameTemplate: "{{.Order}}. {{.RedSchool}}-{{.RedName}} VS {{.BlueSchool}}-{{.BlueName}}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: record-dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: record-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: record-dispatcher
    spec:
      serviceAccountName: rm-monitor-dispatcher
      containers:
        - name: record-dispatcher
          image: rm-monitor/record-dispatcher:latest
          imagePullPolicy: Always
          args: ["-f", "/etc/rm-monitor/config.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/rm-monitor/config.yml
              subPath: config.yml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: record-dispatcher-config
