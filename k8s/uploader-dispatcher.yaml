apiVersion: v1
kind: ConfigMap
metadata:
  name: uploader-dispatcher-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: true
    RedisConf:
      Host: redis:6379
      Pass: ""
    LarkConf:
      AppId: ""
      AppSecret: ""
    UploadConf:
      BaseDir: /records
      BitableAppToken: E2embrciuaax6sscQKwcTdHdnZf
      Concurrency: 1
    K8sJobConf:
      Namespace: rm-monitor
      Image: rm-monitor/uploader-job:latest
      ConfigMapName: uploader-job-config
      RecordsPVC: rm-monitor-records
      RecordsMountPath: /records
      TTLSecondsAfterFinished: 86400
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uploader-job-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: false
    LarkConf:
      AppId: ""
      AppSecret: ""
    RedisConf:
      Host: redis:6379
      Pass: ""
    UploadConf:
      BaseDir: /records
      PartRetries: 3
      RetryBackoff: 2
      RateLimitPerMinute: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uploader-dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: uploader-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uploader-dispatcher
    spec:
      serviceAccountName: rm-monitor-dispatcher
      containers:
        - name: uploader-dispatcher
          image: rm-monitor/uploader-dispatcher:latest
          imagePullPolicy: Always
          args: ["-f", "/etc/rm-monitor/config.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/rm-monitor/config.yml
              subPath: config.yml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: uploader-dispatcher-config
