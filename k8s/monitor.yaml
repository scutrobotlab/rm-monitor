apiVersion: v1
kind: ConfigMap
metadata:
  name: monitor-config
data:
  config.yml: |
    PostgresConf:
      DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
      AutoMigrate: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monitor
    spec:
      containers:
        - name: monitor
          image: rm-monitor/monitor:latest
          args:
            - -f
            - /app/etc/config.yml
          volumeMounts:
            - name: config
              mountPath: /app/etc/config.yml
              subPath: config.yml
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: monitor-config
