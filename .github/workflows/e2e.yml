name: E2E

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  integration:
    name: unit and integration checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: danmu-job/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Helm
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Go tests
        run: go test ./pkg/... ./artifact-cleaner/... ./match-controller/... ./record-job/... ./stt-job/... ./transcode-job/... ./lark-record-job/... ./highlight-job/... ./manifest-job/... ./lark-notifier/... ./migrate-job/... ./health-checker/... ./cmd/stt-subtitle

      - name: Danmu job tests
        working-directory: danmu-job
        run: npm ci && npm test

      - name: Highlight artifact job tests
        run: cargo test --manifest-path highlight-artifact-job/Cargo.toml --locked

      - name: Bilibili publish job tests
        run: cargo test --manifest-path highlight-publish-bilibili-job/Cargo.toml --locked

      - name: Helm validation
        run: |
          helm lint charts/rm-monitor
          helm template rm-monitor charts/rm-monitor --namespace rm-monitor --values charts/rm-monitor/values.yaml

