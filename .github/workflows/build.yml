name: Build images

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  detect:
    name: detect images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build image matrix
        id: detect
        shell: bash
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          components = [
              ("lark-notifier", "lark-notifier/Dockerfile", "go", ["lark-notifier/"]),
              ("artifact-cleaner", "artifact-cleaner/Dockerfile", "go", ["artifact-cleaner/"]),
              ("match-controller", "match-controller/Dockerfile", "go", ["match-controller/"]),
              ("record-job", "record-job/Dockerfile", "go", ["record-job/"]),
              ("stt-job", "stt-job/Dockerfile", "go", ["stt-job/"]),
              ("stt-subtitle", "cmd/stt-subtitle/Dockerfile", "go", ["cmd/stt-subtitle/"]),
              ("highlight-job", "highlight-job/Dockerfile", "go", ["highlight-job/"]),
              ("manifest-job", "manifest-job/Dockerfile", "go", ["manifest-job/"]),
              ("migrate-job", "migrate-job/Dockerfile", "go", ["migrate-job/"]),
              ("health-checker", "health-checker/Dockerfile", "go", ["health-checker/"]),
              ("lark-record-job", "lark-record-job/Dockerfile", "go", ["lark-record-job/"]),
              ("transcode-job", "transcode-job/Dockerfile", "rust", ["transcode-job/"]),
              ("danmu-job", "danmu-job/Dockerfile", "node", ["danmu-job/"]),
              ("analyze-job", "analyze-job/Dockerfile", "python", ["analyze-job/"]),
              ("highlight-artifact-job", "highlight-artifact-job/Dockerfile", "rust", ["highlight-artifact-job/"]),
              ("record-trim-job", "record-trim-job/Dockerfile", "rust", ["record-trim-job/"]),
          ]

          event = os.environ["GITHUB_EVENT_NAME"]
          head = os.environ["GITHUB_SHA"]
          if event == "pull_request":
              base_ref = os.environ["GITHUB_BASE_REF"]
              subprocess.run(["git", "fetch", "origin", base_ref, "--depth=1"], check=True)
              base = subprocess.check_output(["git", "merge-base", f"origin/{base_ref}", "HEAD"], text=True).strip()
          else:
              base = os.environ.get("GITHUB_EVENT_BEFORE", "")
              if not base or set(base) == {"0"}:
                  base = subprocess.check_output(["git", "rev-list", "--max-parents=0", "HEAD"], text=True).splitlines()[0].strip()
              elif subprocess.run(["git", "cat-file", "-e", f"{base}^{{commit}}"]).returncode != 0:
                  try:
                      base = subprocess.check_output(["git", "rev-parse", "HEAD^"], text=True).strip()
                  except subprocess.CalledProcessError:
                      base = subprocess.check_output(["git", "rev-list", "--max-parents=0", "HEAD"], text=True).splitlines()[0].strip()

          changed = subprocess.check_output(["git", "diff", "--name-only", base, head], text=True).splitlines()
          changed = [p.replace("\\", "/") for p in changed]

          go_common = any(p.startswith(("pkg/", "ent/")) or p in {"go.mod", "go.sum"} for p in changed)
          selected = []
          for app, dockerfile, kind, prefixes in components:
              own_change = any(any(p.startswith(prefix) for prefix in prefixes) for p in changed)
              common_change = kind == "go" and go_common
              if own_change or common_change:
                  selected.append({"app": app, "dockerfile": dockerfile})

          matrix = {"include": selected}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")
              out.write(f"count={len(selected)}\n")
          print("changed files:")
          for p in changed:
              print(f"  {p}")
          print("selected images:")
          for item in selected:
              print(f"  {item['app']}")
          PY

  helm:
    name: validate helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Helm lint
        run: helm lint charts/rm-monitor --set imageTagOverride=sha-dev

      - name: Helm template
        run: helm template rm-monitor charts/rm-monitor --namespace rm-monitor --values charts/rm-monitor/values.yaml --set imageTagOverride=sha-dev

  docker:
    name: build ${{ matrix.app }}
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-

      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  chart:
    name: publish helm chart
    needs:
      - helm
      - detect
      - docker
    if: always() && github.event_name == 'push' && needs.helm.result == 'success' && (needs.docker.result == 'success' || needs.docker.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Login to GHCR for Helm
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Resolve component image tags
        shell: bash
        env:
          MATRIX_JSON: ${{ needs.detect.outputs.matrix }}
        run: |
          set -euo pipefail
          python -m pip install --user pyyaml
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          prev_dir="$(mktemp -d)"
          prev_values=""
          prev_chart=""
          if helm pull "oci://ghcr.io/${owner}/charts/rm-monitor" --untar --untardir "${prev_dir}"; then
            prev_values="${prev_dir}/rm-monitor/values.yaml"
            prev_chart="${prev_dir}/rm-monitor/Chart.yaml"
          fi
          export prev_values prev_chart
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          components = [
              "lark-notifier",
              "artifact-cleaner",
              "match-controller",
              "record-job",
              "stt-job",
              "stt-subtitle",
              "highlight-job",
              "manifest-job",
              "migrate-job",
              "health-checker",
              "lark-record-job",
              "transcode-job",
              "danmu-job",
              "analyze-job",
              "highlight-artifact-job",
              "record-trim-job",
          ]

          current_tag = "sha-" + os.environ["GITHUB_SHA"][:7]
          matrix = json.loads(os.environ.get("MATRIX_JSON") or '{"include":[]}')
          selected = {item["app"] for item in matrix.get("include", [])}

          prev_tags = {}
          prev_values = Path(os.environ.get("prev_values", ""))
          if prev_values.exists():
              with prev_values.open(encoding="utf-8") as f:
                  prev = yaml.safe_load(f) or {}
              prev_tags.update(prev.get("imageTags") or {})

          prev_chart = Path(os.environ.get("prev_chart", ""))
          if prev_chart.exists():
              with prev_chart.open(encoding="utf-8") as f:
                  chart = yaml.safe_load(f) or {}
              app_version = str(chart.get("appVersion") or "")
              if app_version:
                  default_prev_tag = app_version if app_version.startswith("sha-") else "sha-" + app_version[:7]
                  for component in components:
                      prev_tags.setdefault(component, default_prev_tag)

          tags = {}
          for component in components:
              tags[component] = current_tag if component in selected else prev_tags.get(component, current_tag)

          values_path = Path("charts/rm-monitor/values.yaml")
          with values_path.open(encoding="utf-8") as f:
              values = yaml.safe_load(f) or {}
          values["imageTags"] = tags
          with values_path.open("w", encoding="utf-8") as f:
              yaml.safe_dump(values, f, allow_unicode=True, sort_keys=False)

          print("chart image tags:")
          for component in components:
              marker = "*" if component in selected else " "
              print(f"{marker} {component}: {tags[component]}")
          PY

      - name: Package Helm chart
        shell: bash
        run: |
          helm package charts/rm-monitor \
            --version "0.1.${{ github.run_number }}" \
            --app-version "${{ github.sha }}" \
            --destination .helm-package

      - name: Push Helm chart to GHCR
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          helm push .helm-package/rm-monitor-*.tgz "oci://ghcr.io/${owner}/charts"
