name: Build images

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: lark-notifier
            dockerfile: lark-notifier/Dockerfile
          - app: monitor
            dockerfile: monitor/Dockerfile
          - app: record-job
            dockerfile: record-job/Dockerfile
          - app: record-dispatcher
            dockerfile: record-dispatcher/Dockerfile
          - app: stt-job
            dockerfile: stt-job/Dockerfile
          - app: manifest-job
            dockerfile: manifest-job/Dockerfile
          - app: artifact-cleaner
            dockerfile: artifact-cleaner/Dockerfile
          - app: uploader-dispatcher
            dockerfile: uploader-dispatcher/Dockerfile
          - app: uploader-job
            dockerfile: uploader-job/Dockerfile
          - app: transcode-dispatcher
            dockerfile: transcode-dispatcher/Dockerfile
          - app: transcode-job
            dockerfile: transcode-job/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            APP=${{ matrix.app }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
