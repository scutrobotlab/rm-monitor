imagePullPolicy: Always
jobImagePullPolicy: IfNotPresent

serviceAccount:
  name: dispatcher

priorityClasses:
  recordCritical:
    name: record-critical
    value: 100000
  background:
    name: background
    value: 1000

postgres:
  dsn: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable

redis:
  host: redis:6379
  pass: ""
  type: node

lark:
  appId: ""
  appSecret: ""

upload:
  bitableAppToken: ""
  concurrency: 1
  partRetries: 3
  retryBackoff: 2
  rateLimitPerMinute: 30

monitor:
  scheduleURL: ""

record:
  res: middle
  liveInfoURL: ""
  baseDir: /records
  audioRoles:
    - "主视角"
  roleBlackList:
    - "主视角（无解说版）"
    - "蓝方机器人第一视角合集"
    - "红方机器人第一视角合集"

llm:
  baseURL: ""
  apiKey: ""
  model: ""
  timeoutSeconds: 120

stt:
  enabled: false
  role: ""
  whisperServerUrls: []

danmu:
  enabled: false
  appId: ""
  appKey: ""
  videoOffsetSeconds: -3

ocr:
  enabled: false
  role: "主视角"
  frameInterval: 1
  similarityThreshold: 0.6
  maxConcurrentJobs: 1

highlight:
  enabled: false
  role: "主视角"
  algorithmVersion: "danmu-zscore-v1"
  maxHighlightsPerRound: 5
  maxConcurrentJobs: 3
  minClipSeconds: 20
  maxClipSeconds: 90
  preSeconds: 15
  postSeconds: 25
  mergeGapSeconds: 20
  publish: {}

publish:
  bilibili:
    enabled: false
    cookieSecretName: biliup-cookie
    cookieSecretKey: cookies.json
    tid: 232
    copyright: 2
    source: "RoboMaster机甲大师"
    titleTemplate: "{{.LLMTitle}} {{.Event}}-{{.Zone}} 高光时刻"
    descTemplate: |
      {{.Description}}

      {{.Event}} {{.Zone}}
      {{.MatchName}} Round {{.RoundNo}}
    dynamicTemplate: "{{.Title}}"
    tags:
      - RoboMaster
      - 机甲大师
      - 机器人
      - 赛事高光
    noReprint: false
    openElec: true
    maxConcurrentJobs: 1
    cover:
      enabled: true

transcode:
  sourceRetentionDays: 7
  maxConcurrent: 6
  cpuRequest: "6000m"
  cpuLimit: "8000m"
  memoryRequest: "2Gi"
  memoryLimit: "6Gi"

priority: []

storage:
  record:
    volumeName: records
    pvcName: records
    storageClassName: records
    size: 500Gi
  shared:
    volumeName: records-shared
    pvcName: records-shared
    storageClassName: records-shared
    size: 500Gi

jobs:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  recordsMountPath: /records
  artifactCleaner:
    schedule: "0 0 * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3

components:
  monitor:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  larkNotifier:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
  recordDispatcher:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  uploaderDispatcher:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 256Mi
  transcodeDispatcher:
    replicas: 1
    annotations: {}
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 256Mi
  highlightDispatcher:
    replicas: 1
    annotations: {}
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 256Mi
  ocrDispatcher:
    replicas: 1
    annotations: {}
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 256Mi
  artifactCleaner:
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  healthChecker:
    schedule: "*/1 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 5
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
