imagePullPolicy: Always
jobImagePullPolicy: IfNotPresent
imageTagOverride: ""
imageTags: {}

serviceAccount:
  name: rm-monitor-workflow

argo:
  enabled: true
  namespace: rm-monitor
  matchWorkflowTemplate: rm-match-workflow

priorityClasses:
  recordCritical:
    name: record-critical
    value: 100000
  background:
    name: background
    value: 1000

postgres:
  dsn: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable

redis:
  host: redis:6379
  pass: ""
  type: node

lark:
  appId: ""
  appSecret: ""

upload:
  bitableAppToken: ""
  concurrency: 1
  larkRecordMaxConcurrent: 2
  partRetries: 3
  retryBackoff: 2
  rateLimitPerMinute: 30

controller:
  scheduleURL: ""

record:
  res: middle
  liveInfoURL: ""
  baseDir: /records
  stopDelaySeconds: 60
  audioRoles:
    - "主视角"
  roleBlackList:
    - "主视角（无解说版）"
    - "蓝方机器人第一视角合集"
    - "红方机器人第一视角合集"

dify:
  baseURL: ""
  timeoutSeconds: 180

manifest:
  reportWorkflowAPIKey: ""

stt:
  enabled: false
  role: ""
  whisperServerUrls: []
  useQuality: false
  qualityWorkflowAPIKey: ""

danmu:
  enabled: false
  appId: ""
  appKey: ""
  videoOffsetSeconds: -3

ocrServer:
  baseURL: ""
  timeoutSeconds: 30

analyze:
  enabled: false
  role: "主视角"
  maxConcurrentJobs: 1
  scan:
    fps: 1
    width: 320
    height: 180
    maxStartScanSeconds: 1800
    maxSettlementScanSeconds: 1800
    settlementChunkSeconds: 90
    minSettlementSecond: 60
    minRoundSeconds: 60
    settlementTailSeconds: 5
    settlementRefineWindowSeconds: 8
    settlementRefineFPS: 3

highlight:
  enabled: false
  role: "主视角"
  algorithmVersion: "danmu-zscore-dify-v1"
  reviewWorkflowAPIKey: ""
  maxHighlightsPerRound: 5
  maxConcurrentJobs: 3
  minClipSeconds: 20
  maxClipSeconds: 50
  preSeconds: 8
  postSeconds: 18
  mergeGapSeconds: 12
  previewSeconds: 6
  previewFPS: 8
  previewWidth: 360
  publish: {}

transcode:
  sourceRetentionDays: 7
  maxConcurrent: 6
  cpuRequest: "6000m"
  cpuLimit: "8000m"
  memoryRequest: "2Gi"
  memoryLimit: "6Gi"

priority: []

storage:
  record:
    volumeName: records
    pvcName: records
    storageClassName: records
    size: 500Gi
  shared:
    volumeName: records-shared
    pvcName: records-shared
    storageClassName: records-shared
    size: 500Gi

jobs:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  recordsMountPath: /records
  migrate:
    backoffLimit: 1
    ttlSecondsAfterFinished: 86400

components:
  migrateJob:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  matchController:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  larkNotifier:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
  healthChecker:
    schedule: "*/1 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 5
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  artifactCleaner:
    schedule: "0 0 * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 5
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
