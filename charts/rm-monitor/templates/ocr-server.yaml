{{- if .Values.ocrServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-server
  namespace: {{ include "rm-monitor.namespace" . }}
  labels:
{{ include "rm-monitor.commonLabels" . | indent 4 }}
{{ include "rm-monitor.selectorLabels" (dict "name" "ocr-server") | indent 4 }}
spec:
  replicas: {{ .Values.ocrServer.replicas }}
  selector:
    matchLabels:
{{ include "rm-monitor.selectorLabels" (dict "name" "ocr-server") | indent 6 }}
  template:
    metadata:
      labels:
{{ include "rm-monitor.selectorLabels" (dict "name" "ocr-server") | indent 8 }}
    spec:
      {{- with .Values.ocrServer.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: ocr-server
          image: {{ include "rm-monitor.image" (dict "root" . "component" "ocr-server") }}
          imagePullPolicy: {{ include "rm-monitor.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: {{ .Values.ocrServer.port }}
          env:
            - name: OCR_DEVICE
              value: {{ .Values.ocrServer.device | quote }}
            - name: OCR_LANG
              value: {{ .Values.ocrServer.lang | quote }}
            - name: OCR_VERSION
              value: {{ .Values.ocrServer.version | quote }}
            - name: OCR_ENABLE_MKLDNN
              value: {{ .Values.ocrServer.enableMKLDNN | quote }}
            - name: OCR_CPU_THREADS
              value: {{ .Values.ocrServer.cpuThreads | quote }}
            - name: OCR_MAX_BATCH
              value: {{ .Values.ocrServer.maxBatch | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
{{ toYaml .Values.ocrServer.resources | indent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /root/.paddlex
      volumes:
        - name: model-cache
          {{- if .Values.ocrServer.modelCachePVCName }}
          persistentVolumeClaim:
            claimName: {{ .Values.ocrServer.modelCachePVCName }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-server
  namespace: {{ include "rm-monitor.namespace" . }}
  labels:
{{ include "rm-monitor.commonLabels" . | indent 4 }}
{{ include "rm-monitor.selectorLabels" (dict "name" "ocr-server") | indent 4 }}
spec:
  selector:
{{ include "rm-monitor.selectorLabels" (dict "name" "ocr-server") | indent 4 }}
  ports:
    - name: http
      port: {{ .Values.ocrServer.port }}
      targetPort: http
{{- end }}

