{{- if .Values.argo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: rm-monitor-argo-semaphores
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  lark-record: {{ .Values.upload.larkRecordMaxConcurrent | quote }}
  transcode: {{ .Values.transcode.maxConcurrent | quote }}
{{- end }}
