apiVersion: v1
kind: ConfigMap
metadata:
  name: migrate-config
  namespace: {{ include "rm-monitor.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  config.yml: |
{{ include "rm-monitor.postgresConf" . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: match-controller-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
    MonitorConf:
      ScheduleURL: {{ .Values.controller.scheduleURL | quote }}
{{ include "rm-monitor.argoConf" . | indent 4 }}
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.redisConf" . | indent 4 }}
{{ include "rm-monitor.recordConf" . | indent 4 }}
{{ include "rm-monitor.danmuConf" . | indent 4 }}
{{ include "rm-monitor.analyzeConf" . | indent 4 }}
{{ include "rm-monitor.ocrServerConf" . | indent 4 }}
{{ include "rm-monitor.highlightConf" . | indent 4 }}
    UploadConf:
      BitableAppToken: {{ .Values.upload.bitableAppToken | quote }}
      Concurrency: {{ .Values.upload.concurrency }}
      PartRetries: {{ .Values.upload.partRetries }}
      RetryBackoff: {{ .Values.upload.retryBackoff }}
      RateLimitPerMinute: {{ .Values.upload.rateLimitPerMinute }}
    WhisperServerUrls:
{{ toYaml .Values.stt.whisperServerUrls | nindent 6 }}
{{ include "rm-monitor.priority" . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lark-notifier-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
    LarkConf:
      AppId: {{ .Values.lark.appId }}
      AppSecret: {{ .Values.lark.appSecret }}
{{ include "rm-monitor.redisConf" . | indent 4 }}
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.recordConf" . | indent 4 }}
{{ include "rm-monitor.highlightConf" . | indent 4 }}
    UploadConf:
      Concurrency: {{ .Values.upload.concurrency }}
      PartRetries: {{ .Values.upload.partRetries }}
      RetryBackoff: {{ .Values.upload.retryBackoff }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: record-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.recordConf" . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stt-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
    WhisperServerUrls:
{{ toYaml .Values.stt.whisperServerUrls | nindent 6 }}
{{ include "rm-monitor.difyConf" . | indent 4 }}
    STTQualityConf:
      UseQuality: {{ .Values.stt.useQuality }}
      WorkflowAPIKey: {{ .Values.stt.qualityWorkflowAPIKey | quote }}
{{ include "rm-monitor.recordConf" . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: danmu-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.recordConf" . | indent 4 }}
{{ include "rm-monitor.danmuConf" . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analyze-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.analyzeConf" . | indent 4 }}
{{ include "rm-monitor.ocrServerConf" . | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: highlight-artifact-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.recordConf" . | indent 4 }}
{{ include "rm-monitor.highlightConf" . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: highlight-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.recordConf" . | indent 4 }}
{{ include "rm-monitor.difyConf" . | indent 4 }}
{{ include "rm-monitor.highlightConf" . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: manifest-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.redisConf" . | indent 4 }}
{{ include "rm-monitor.recordConf" . | indent 4 }}
{{ include "rm-monitor.difyConf" . | indent 4 }}
    ManifestConf:
      ReportWorkflowAPIKey: {{ .Values.manifest.reportWorkflowAPIKey | quote }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lark-record-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
    LarkConf:
      AppId: {{ .Values.lark.appId }}
      AppSecret: {{ .Values.lark.appSecret }}
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.redisConf" . | indent 4 }}
    UploadConf:
      BitableAppToken: {{ .Values.upload.bitableAppToken | quote }}
      PartRetries: {{ .Values.upload.partRetries }}
      RetryBackoff: {{ .Values.upload.retryBackoff }}
      RateLimitPerMinute: {{ .Values.upload.rateLimitPerMinute }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: transcode-job-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
    TranscodeConf:
      SourceRetentionDays: {{ .Values.transcode.sourceRetentionDays }}
      AV1Preset: {{ .Values.transcode.av1Preset }}
      AV1Bitrate: {{ .Values.transcode.av1Bitrate | quote }}
      AV1GOP: {{ .Values.transcode.av1GOP }}
      AV1PixFmt: {{ .Values.transcode.av1PixFmt | quote }}
      AV1AudioBitrate: {{ .Values.transcode.av1AudioBitrate | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: artifact-cleaner-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.postgresConf" . | indent 4 }}
    TranscodeConf:
      BaseDir: {{ .Values.record.baseDir }}
      SourceRetentionDays: {{ .Values.transcode.sourceRetentionDays }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: health-checker-config
  namespace: {{ include "rm-monitor.namespace" . }}
data:
  config.yml: |
{{ include "rm-monitor.postgresConf" . | indent 4 }}
{{ include "rm-monitor.redisConf" . | indent 4 }}
{{ include "rm-monitor.argoConf" . | indent 4 }}
    K8sJobConf:
      Namespace: {{ include "rm-monitor.namespace" . }}
      Image: {{ include "rm-monitor.image" (dict "root" . "component" "health-checker") }}
      ServiceAccountName: {{ .Values.serviceAccount.name }}
      RecordsPVC: {{ .Values.storage.shared.pvcName }}
      RecordsMountPath: {{ .Values.jobs.recordsMountPath }}
      ImagePullPolicy: {{ include "rm-monitor.imagePullPolicy" . }}
