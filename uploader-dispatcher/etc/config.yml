PostgresConf:
  DSN: postgres://rm_monitor:rm_monitor@127.0.0.1:5432/rm_monitor?sslmode=disable
  AutoMigrate: true
UploadConf:
  BaseDir: /records
  Concurrency: 1
K8sJobConf:
  Namespace: rm-monitor
  Image: ghcr.io/scutrobotlab/rm-monitor/uploader-job:latest
  ConfigMapName: uploader-job-config
  RecordsPVC: rm-monitor-records
  RecordsMountPath: /records
  TTLSecondsAfterFinished: 86400
