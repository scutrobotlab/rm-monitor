PostgresConf:
  DSN: postgres://rm_monitor:rm_monitor@127.0.0.1:5432/rm_monitor?sslmode=disable
  AutoMigrate: true
TranscodeConf:
  BaseDir: /records
  AllowedWindow: "23:00-06:00"
  SuspendWhenRecordingActive: true
  SourceRetentionDays: 7
  MaxConcurrent: 4
  CPURequest: "6000m"
  CPULimit: "8000m"
  MemoryRequest: "2Gi"
  MemoryLimit: "6Gi"
K8sJobConf:
  Namespace: rm-monitor
  Image: ghcr.io/scutrobotlab/rm-monitor/transcode-job:latest
  ConfigMapName: transcode-job-config
  RecordsPVC: rm-monitor-records
  RecordsMountPath: /records
  TTLSecondsAfterFinished: 86400
