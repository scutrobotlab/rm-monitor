PostgresConf:
  DSN: postgres://rm_monitor:rm_monitor@postgres:5432/rm_monitor?sslmode=disable
OCRConf:
  Enabled: false
  Role: "主视角"
  FrameInterval: 1
  SimilarityThreshold: 0.6
  MaxConcurrentJobs: 1
K8sJobConf:
  Namespace: rm-monitor
  Image: ghcr.io/scutrobotlab/rm-monitor/ocr-job:dev
  ConfigMapName: ocr-job-config
  ServiceAccountName: dispatcher
  RecordsPVC: records
  RecordsMountPath: /records
