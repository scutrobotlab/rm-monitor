services:
  ppocr:
    build:
      context: ../..
      dockerfile: analyze-job/ocr-daemon/Dockerfile
      args:
        PADDLE_DEVICE: cpu
    image: rm-monitor/ppocrv5-daemon:local
    container_name: rm-monitor-ppocrv5
    restart: unless-stopped
    environment:
      OCR_DEVICE: cpu
      OCR_LANG: ch
      OCR_VERSION: PP-OCRv5
      OCR_ENABLE_MKLDNN: "true"
      OCR_CPU_THREADS: "4"
      OCR_MAX_BATCH: "32"
    ports:
      - "48089:8000"
    volumes:
      - ./models:/root/.paddlex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
