# analyze-job target configuration shape.
#
# OCRServerConf is service/client configuration. The OCR daemon is external
# infrastructure, like Postgres/Redis; this chart only consumes its endpoint.
OCRServerConf:
  BaseURL: http://host.docker.internal:48089
  TimeoutSeconds: 30

AnalyzeConf:
  Enabled: false
  Role: "主视角"
  MaxConcurrentJobs: 1
  Scan:
    FPS: 1
    Width: 320
    Height: 180
    MaxStartScanSeconds: 1800
    MaxSettlementScanSeconds: 1800
    SettlementChunkSeconds: 90
    MinSettlementSecond: 60
    MinRoundSeconds: 60
    SettlementTailSeconds: 5
    SettlementRefineWindowSeconds: 8
    SettlementRefineFPS: 3

