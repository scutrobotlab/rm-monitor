services:
  ppocr:
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlex/hps:paddlex3.5-gpu
    container_name: rm-monitor-ppocr
    restart: unless-stopped
    shm_size: 8g
    ports:
      - "48089:8080"
    volumes:
      - ./server:/app
      - ./logs:/logs
    environment:
      PADDLEX_HPS_USE_HPIP: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    entrypoint:
      - bash
      - /app/server.sh
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
