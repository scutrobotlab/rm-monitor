name: Auto Docker build

on:
  push:
    branches:
      - '*'

jobs:
  lark-notifier:
    name: build lark-notifier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.SCUTBOT_HUB_USER }}
          password: ${{ secrets.SCUTBOT_HUB_PASS }}
          registry: ${{ secrets.SCUTBOT_HUB_REGISTRY }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            APP=lark-notifier
          push: true
          tags: ${{ secrets.SCUTBOT_HUB_REGISTRY }}/web/rm-monitor/lark-notifier:latest
  monitor:
    name: build monitor
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.SCUTBOT_HUB_USER }}
          password: ${{ secrets.SCUTBOT_HUB_PASS }}
          registry: ${{ secrets.SCUTBOT_HUB_REGISTRY }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
              APP=monitor
          push: true
          tags: ${{ secrets.SCUTBOT_HUB_REGISTRY }}/web/rm-monitor/monitor:latest
  recorder:
    name: build recorder
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.SCUTBOT_HUB_USER }}
          password: ${{ secrets.SCUTBOT_HUB_PASS }}
          registry: ${{ secrets.SCUTBOT_HUB_REGISTRY }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
              APP=recorder
          push: true
          tags: ${{ secrets.SCUTBOT_HUB_REGISTRY }}/web/rm-monitor/recorder:latest
