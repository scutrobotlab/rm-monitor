PostgresConf:
  DSN: postgres://rm_monitor:rm_monitor@127.0.0.1:5432/rm_monitor?sslmode=disable
RedisConf:
  Host: 127.0.0.1:6379
RecordConf:
  Res: middle
  BaseDir: /records
  PathTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}/Round-{{.RoundNo}}/{{.Role}}.flv"
  MatchDirTemplate: "{{.Event}}/{{.Zone}}/{{.MatchName}}"
  MatchNameTemplate: "{{.Order}}. {{.RedSchool}}-{{.RedName}} VS {{.BlueSchool}}-{{.BlueName}}"
DanmuConf:
  Enabled: false
  AppID: ""
  AppKey: ""
K8sJobConf:
  Namespace: rm-monitor
  Image: ghcr.io/scutrobotlab/rm-monitor/record-job:latest
  ConfigMapName: record-job-config
  RecordsPVC: records
  RecordsMountPath: /records
  TTLSecondsAfterFinished: 86400
ManifestJobConf:
  Namespace: rm-monitor
  Image: ghcr.io/scutrobotlab/rm-monitor/manifest-job:latest
  ConfigMapName: manifest-job-config
  RecordsPVC: records-shared
  RecordsMountPath: /records
  TTLSecondsAfterFinished: 86400
DanmuJobConf:
  Namespace: rm-monitor
  Image: ""
  ConfigMapName: danmu-job-config
  RecordsPVC: records
  RecordsMountPath: /records
  TTLSecondsAfterFinished: 86400
